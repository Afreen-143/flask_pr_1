{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">Book Details</h1>

<table class="table table-striped">

    <thead>
        <tr>
            <th>ID</th>
            <th>Book</th>
            <th>Author</th>
            <th>Price</th>
        </tr>
    </thead>

    <tbody>

        {% for book in books %}

        <tr>
              <td>{{ book.id }}</td>
            <td>{{ book.book }}</td>
            <td>{{ book.author }}</td>
            <td>{{ book.price }}</td>
        </tr>

        {% endfor %}

    </tbody>

</table>

<a href="/" class="btn btn-secondary">
    Back To Home
</a>

{% endblock %}
